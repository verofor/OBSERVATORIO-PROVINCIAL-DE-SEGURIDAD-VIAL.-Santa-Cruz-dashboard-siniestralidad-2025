  /* ── Estilos de impresión ── */
  @media print {

    /* Página A4 apaisada con márgenes para informe oficial */
    @page { size: A4 landscape; margin: 12mm 14mm 14mm 14mm; }

    /* Forzar colores e imágenes de fondo */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Ocultar botón y elementos interactivos */
    #btn-pdf, .no-print { display: none !important; }

    /* Evitar cortes dentro de gráficos, cards y tablas */
    canvas, figure, table, img,
    [class*="card"], [class*="chart"],
    [class*="graph"], [class*="widget"] {
      page-break-inside: avoid !important;
      break-inside: avoid !important;
    }

    /* Ajustar canvas al ancho de la página */

<script>
/* ════════════════════════════════════════════════════
   beforeprint / afterprint
   Libera overflow y height del dashboard antes de
   imprimir y los restaura cuando termina.
   ════════════════════════════════════════════════════ */
(function () {
  var saved = [];

  function liberarDOM() {
    saved = [];
    var allEls = document.querySelectorAll('*');

    allEls.forEach(function (el) {
      var cs = window.getComputedStyle(el);

      var needsFix = false;
      var patch = { el: el, props: {} };

      /* 1. Overflow hidden / auto / scroll → visible */
      ['overflow','overflowX','overflowY'].forEach(function(prop) {
        var val = cs[prop];
        if (val === 'hidden' || val === 'auto' || val === 'scroll') {
          patch.props[prop] = el.style[prop];
          el.style[prop] = 'visible';
          needsFix = true;
        }
      });

      /* 2. Altura fija (px) → auto */
      var h = cs.height;
      if (h && h !== 'auto' && h.endsWith('px')) {
        var hPx = parseFloat(h);
        /* Solo liberamos alturas que parecen "viewport-locked" (> 300px)
           para no romper el layout de cards pequeños */
        if (hPx > 300) {
          patch.props.height    = el.style.height;
          patch.props.maxHeight = el.style.maxHeight;
          el.style.height    = 'auto';
          el.style.maxHeight = 'none';
          needsFix = true;
        }
      }

      /* 3. contain (React portals, Radix, etc.) */
      var contain = cs.contain;
      if (contain && contain !== 'none' && contain !== 'auto') {
        patch.props.contain = el.style.contain;
        el.style.contain = 'none';
        needsFix = true;
      }

      /* 4. position: fixed → relative (nav, topbar) */
      if (cs.position === 'fixed') {
        patch.props.position = el.style.position;
        patch.props.top      = el.style.top;
        el.style.position = 'relative';
        el.style.top      = 'auto';
        needsFix = true;
      }

      if (needsFix) saved.push(patch);
    });
  }

  function restaurarDOM() {
    saved.forEach(function (patch) {
      Object.keys(patch.props).forEach(function (prop) {
        patch.el.style[prop] = patch.props[prop];
      });
    });
    saved = [];
  }

  /* Función principal del botón */
  window.imprimirPDF = function () {
    var tituloOrig = document.title;
    document.title = 'Informe Siniestralidad Vial 2025 – OPSV Santa Cruz';
    window.print();
    setTimeout(function () { document.title = tituloOrig; }, 1500);
  };

  /* Listeners nativos de impresión */
  window.addEventListener('beforeprint', liberarDOM);
  window.addEventListener('afterprint',  restaurarDOM);

  /* matchMedia para Chrome (beforeprint no siempre dispara en Chrome) */
  var mq = window.matchMedia('print');
  mq.addEventListener('change', function (e) {
    if (e.matches) liberarDOM(); else restaurarDOM();
  });
})();
</script>

  <script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
